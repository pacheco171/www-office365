<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sem Permissão — LIVE! Microsoft 365</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#f2ede8;font-family:'Lexend',sans-serif;
}
.card{
  background:#fff;border:1px solid #ddd8d0;border-radius:16px;
  padding:52px 44px;max-width:440px;width:90%;text-align:center;
  box-shadow:0 8px 40px rgba(30,28,26,.08);
}
.brand{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  color:#1e1c1a;letter-spacing:.5px;margin-bottom:36px;
}
.brand em{color:#9c7a52;font-style:normal;}
.icon-wrap{
  width:68px;height:68px;border-radius:50%;
  background:rgba(156,122,82,.08);border:1px solid rgba(156,122,82,.2);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
}
.icon-wrap svg{color:#9c7a52;}
h1{font-size:20px;font-weight:600;color:#1e1c1a;margin-bottom:8px;}
p{font-size:13px;color:#8a8070;line-height:1.65;margin-bottom:16px;}
.badge{
  display:inline-block;font-size:11px;font-weight:500;
  color:#8a8070;background:#f2ede8;
  border:1px solid #ddd8d0;border-radius:20px;
  padding:4px 14px;margin-bottom:32px;
}
a.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#9c7a52;color:#fff;text-decoration:none;
  border-radius:8px;padding:11px 24px;font-size:13px;font-weight:500;
  font-family:'Lexend',sans-serif;transition:background .15s;
}
a.btn:hover{background:#8a6b45;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LIVE<em>!</em></div>
  <div class="icon-wrap">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>Acesso não permitido</h1>
  <p>Você não tem permissão para acessar esta página.</p>
  {% if role %}
  <div class="badge">Seu acesso: {{ role_label }}</div>
  {% endif %}
  <br>
  <a href="/" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Voltar ao Dashboard
  </a>
</div>
</body>
</html>
