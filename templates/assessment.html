{% extends "base.html" %}
{% block title %}Assessment M365{% endblock %}
{% block content %}
<div class="view active" id="view-assessment">
  <div class="topbar">
    <div><div class="page-heading" data-i18n="aval.page_heading">Assessment Microsoft 365</div><div class="page-sub" data-i18n="aval.page_sub">Microsoft Secure Score — avaliação de segurança do tenant</div></div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="toggleNavSidebar(this)" title="Ocultar painel lateral">–</button>
      <div class="topbar-refresh">
        <span class="last-updated" id="assessmentLastUpdated">—</span>
        <button class="btn btn-outline" onclick="refreshAssessment()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span data-i18n="btn.atualizar">Atualizar</span>
        </button>
      </div>
    </div>
  </div>
  <div id="assessmentContent"></div>
</div>
{% endblock %}
