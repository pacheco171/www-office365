{% extends "base.html" %}
{% block title %}Colaboradores{% endblock %}
{% block content %}
<div class="view active" id="view-colaboradores">
  <div class="topbar">
    <div><div class="page-heading">Colaboradores</div><div class="page-sub" id="colabSub">—</div></div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar
      </button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><span class="si">⌕</span><input type="text" class="search-input" id="searchInput" placeholder="Buscar nome, setor, cargo, licença..." oninput="renderTable()"></div>
    <select class="filter-select" id="fltSetor" onchange="renderTable()"><option value="">Todos os setores</option></select>
    <select class="filter-select" id="fltLic" onchange="renderTable()"><option value="">Todas as licenças</option></select>
    <select class="filter-select" id="fltStatus" onchange="renderTable()"><option value="">Todos os status</option><option>Ativo</option><option>Pendente</option><option>Inativo</option></select>
  </div>
  <div class="table-wrap">
    <table><thead><tr><th>Colaborador</th><th>Setor</th><th>Cargo</th><th>Licença M365</th><th class="sort" onclick="sortBy('custo')">Custo/mês ↕</th><th>Status</th><th class="sort" onclick="sortBy('dataISO')">Criado em ↕</th><th></th></tr></thead>
    <tbody id="tableBody"></tbody></table>
    <div class="table-footer"><div class="table-footer-left"><div class="table-info" id="tableInfo">—</div><div class="per-page"><label>Exibir</label><select id="perPageSelect" onchange="changePerPage(this.value)"><option value="10" selected>10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option><option value="all">Todas</option></select></div></div><div class="pagination" id="pagination"></div></div>
  </div>
</div>
{% endblock %}
