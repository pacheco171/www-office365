{% extends "base.html" %}
{% block title %}Colaboradores{% endblock %}
{% block content %}
<div class="view active" id="view-colaboradores">
  <div class="topbar">
    <div><div class="page-heading" data-i18n="term.colaboradores">Colaboradores</div><div class="page-sub" id="colabSub">—</div></div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span data-i18n="btn.exportar">Exportar</span>
      </button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><span class="si">⌕</span><input type="text" class="search-input" id="searchInput" data-i18n-placeholder="flt.buscar" placeholder="Buscar nome, setor, cargo, licença..." oninput="renderTable();_toggleSearchClear()"><button class="search-clear" id="searchClear" onclick="clearSearch()" title="Limpar busca"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <select class="filter-select" id="fltSetor" onchange="renderTable()"><option value="" data-i18n="flt.todos_setores">Todos os setores</option></select>
    <select class="filter-select" id="fltLic" onchange="renderTable()"><option value="" data-i18n="flt.todas_licencas">Todas as licenças</option></select>
    <select class="filter-select" id="fltStatus" onchange="renderTable()"><option value="" data-i18n="flt.todos_status">Todos os status</option><option value="Ativo" data-i18n="status.ativo">Ativo</option><option value="Pendente" data-i18n="status.pendente">Pendente</option><option value="Inativo" data-i18n="status.inativo">Inativo</option></select>
    <div class="filter-with-help"><select class="filter-select" id="fltCargo" onchange="renderTable()"><option value="" data-i18n="flt.certeza_cargo">Certeza do cargo</option><option value="ad" data-i18n="flt.ad_confirmado">AD (confirmado)</option><option value="fallback" data-i18n="flt.sem_dado_ad">Sem dado no AD</option><option value="override" data-i18n="flt.manual">Manual</option></select><span class="help-icon" title="AD (confirmado): cargo vindo do Active Directory | Sem dado no AD: cargo não encontrado | Manual: cargo definido manualmente">?</span></div>
    <select class="filter-select" id="fltPeriodo" onchange="currentPage=1;renderTable()"><option value="" data-i18n="flt.qualquer_data">Qualquer data</option><option value="7" data-i18n="flt.ult_7dias">Últimos 7 dias</option><option value="30" data-i18n="flt.ult_30dias">Últimos 30 dias</option><option value="90" data-i18n="flt.ult_90dias">Últimos 90 dias</option><option value="365" data-i18n="flt.ult_ano">Último ano</option></select>
  </div>
  <div class="table-wrap">
    <table><thead><tr><th data-i18n="col.colaborador">Colaborador</th><th data-i18n="col.setor">Setor</th><th data-i18n="col.cargo">Cargo</th><th data-i18n="col.licenca">Licença M365</th><th class="sort" onclick="sortBy('custo')"><span data-i18n="col.custo_mes">Custo/mês</span><span class="sort-icon" id="sort-icon-custo"> ↕</span></th><th data-i18n="col.status">Status</th><th class="sort" onclick="sortBy('dataISO')"><span data-i18n="col.criado_em">Criado em</span><span class="sort-icon" id="sort-icon-dataISO"> ↕</span></th><th></th></tr></thead>
    <tbody id="tableBody"></tbody></table>
    <div class="table-footer"><div class="table-footer-left"><div class="table-info" id="tableInfo">—</div><div class="per-page"><label data-i18n="flt.exibir">Exibir:</label><select id="perPageSelect" onchange="changePerPage(this.value)"><option value="10" selected>10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option><option value="all" data-i18n="flt.todas">Todas</option></select></div></div><div class="pagination" id="pagination"></div></div>
  </div>
</div>
{% endblock %}
