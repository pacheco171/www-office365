{% extends "base.html" %}
{% block title %}Grupos{% endblock %}
{% block content %}
<div class="view active" id="view-grupos">
  <div class="topbar">
    <div><div class="page-heading" data-i18n="term.grupos">Grupos</div><div class="page-sub" data-i18n="grp.sub">Grupos do Azure AD / Microsoft 365 — segurança, distribuição e M365</div></div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="toggleNavSidebar(this)" title="Ocultar painel lateral">–</button>
      <div class="topbar-refresh">
        <span class="last-updated" id="gruposLastUpdated">—</span>
        <button class="btn btn-outline" onclick="refreshGrupos()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span data-i18n="btn.atualizar">Atualizar</span>
        </button>
      </div>
    </div>
  </div>
  <div id="gruposKpis"></div>
  <div id="gruposTable"></div>
  <div id="gruposMembros" style="display:none"></div>
</div>
{% endblock %}
