{% extends "base.html" %}
{% block title %}Organograma{% endblock %}
{% block content %}
<div class="view active" id="view-organograma">
  <div class="topbar">
    <div>
      <div class="page-heading">Organograma</div>
      <div class="page-sub" id="orgSub">—</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="renderOrganograma()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>Atualizar</span>
      </button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="text" class="search-input" id="orgSearch" placeholder="Buscar setor, nome ou cargo..." oninput="_orgFilter()">
      <button class="search-clear" id="orgSearchClear" onclick="document.getElementById('orgSearch').value='';_orgFilter()" title="Limpar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div id="orgGrid" class="org-grid"></div>

  <!-- Modal edição da árvore -->
  <div id="orgEditModal" style="display:none;position:fixed;inset:0;z-index:1000;background:var(--overlay);align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px">
    <div style="background:var(--surface);border-radius:16px;width:100%;max-width:680px;box-shadow:var(--shadow-lg);margin:auto">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:22px 28px 0">
        <div>
          <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:4px">Editar Árvore</div>
          <h3 id="orgEditModalTitle" style="margin:0;font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px"></h3>
        </div>
        <button onclick="closeOrgEditModal()" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:8px;line-height:0" title="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;height:20px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Instrução -->
      <p style="margin:10px 28px 16px;font-size:.8rem;color:var(--muted);line-height:1.5">
        Clique em <strong>⊕</strong> ao lado de qualquer pessoa para mover ela na hierarquia. As alterações só são aplicadas ao salvar.
      </p>

      <!-- Árvore editável -->
      <div id="orgEditTree" style="padding:0 28px 20px;max-height:60vh;overflow-y:auto"></div>

      <!-- Footer -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-top:1px solid var(--border)">
        <button class="btn btn-outline" onclick="resetOrgTree()" style="color:var(--red);border-color:var(--red)" title="Voltar para hierarquia automática por cargo">
          Resetar para automático
        </button>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" onclick="closeOrgEditModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveOrgTree()">Salvar</button>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
