{% extends "base.html" %}
{% block title %}Políticas de Acesso{% endblock %}
{% block content %}
<div class="view active" id="view-politicas">
  <div class="topbar">
    <div><div class="page-heading" data-i18n="term.politicas">Políticas de Acesso</div><div class="page-sub" data-i18n="pol.sub">Conditional Access Policies configuradas no Azure AD</div></div>
    <div class="topbar-actions">
      <div class="topbar-refresh">
        <span class="last-updated" id="politicasLastUpdated">—</span>
        <button class="btn btn-outline" onclick="refreshPoliticas()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span data-i18n="btn.atualizar">Atualizar</span>
        </button>
      </div>
    </div>
  </div>
  <div id="politicasKpis"></div>
  <div id="politicasTable"></div>
</div>
{% endblock %}
